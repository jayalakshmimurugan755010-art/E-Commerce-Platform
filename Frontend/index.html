<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Platform Dashboard</title>
    <!-- Link External Styling Layout -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        
        <div id="navBar" class="nav hidden">
            <span>Welcome, <strong id="userDisplay"></strong>!</span>
            <button onclick="logout()">Logout</button>
        </div>

        <div id="authSection" class="card">
            <h2>Account Access</h2>
            <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="Enter username"></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Enter password"></div>
            <button onclick="login()">Login</button>
            <button onclick="register()" style="background-color: #2ecc71;">Register New Account</button>
        </div>

        <div id="storeSection" class="hidden">
            <div id="adminPanel" class="card hidden" style="border-top: 4px solid #f1c40f;">
                <h2>Admin Management Panel - Add New Product</h2>
                <div class="form-group"><label>Product Name</label><input type="text" id="prodName"></div>
                <div class="form-group"><label>Price ($)</label><input type="number" id="prodPrice"></div>
                <div class="form-group"><label>Description</label><input type="text" id="prodDesc"></div>
                <button onclick="addProduct()" style="background-color: #f1c40f; color: #333; font-weight: bold;">Upload Product</button>
            </div>

            <h2>Product Catalog</h2>
            <div id="productGrid" class="grid"></div>

            <h2 style="margin-top: 40px;">Order History & Status</h2>
            <div class="card"><div id="orderList">No orders placed yet.</div></div>
        </div>
    </div>

    <!-- Link External App Engine Functional Logic Code -->
    <script src="js/app.js"></script>
</body>
</html>
