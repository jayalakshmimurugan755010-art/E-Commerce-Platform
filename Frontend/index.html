<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Platform Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1, h2 { color: #2c3e50; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], input[type="password"], select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:hover { background-color: #2980b9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: #fff; border: 1px solid #e1e8ed; padding: 15px; border-radius: 6px; text-align: center; }
        .price { color: #27ae60; font-size: 18px; font-weight: bold; margin: 10px 0; }
        .hidden { display: none; }
        .nav { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; color: white; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; }
        .nav button { background-color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Navigation bar (shows when logged in) -->
        <div id="navBar" class="nav hidden">
            <span>Welcome, <strong id="userDisplay"></strong>!</span>
            <button onclick="logout()">Logout</button>
        </div>

        <!-- 1. Authentication Section (Login / Register) -->
        <div id="authSection" class="card">
            <h2>Account Access</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button onclick="login()">Login</button>
            <button onclick="register()" style="background-color: #2ecc71;">Register New Account</button>
        </div>

        <!-- 2. Main E-Commerce Storefront Section -->
        <div id="storeSection" class="hidden">
            
            <!-- Admin Panel: Add Products (Only visible if role is Admin) -->
            <div id="adminPanel" class="card hidden" style="border-top: 4px solid #f1c40f;">
                <h2>Admin Management Panel - Add New Product</h2>
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prodName">
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="prodPrice">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="prodDesc">
                </div>
                <button onclick="addProduct()" style="background-color: #f1c40f; color: #333; font-weight: bold;">Upload Product</button>
            </div>

            <!-- Product Marketplace Grid -->
            <h2>Product Catalog</h2>
            <div id="productGrid" class="grid"></div>

            <!-- Orders Review Section -->
            <h2 style="margin-top: 40px;">Order History & Status</h2>
            <div class="card">
                <div id="orderList">No orders placed yet.</div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let currentUser = null;

        // --- Auth Operations ---
        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const response = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role: username.toLowerCase().includes('admin') ? 'Admin' : 'User' })
            });
            const data = await response.json();
            alert(data.message || data.error);
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();

            if (data.success) {
                currentUser = data;
                document.getElementById('userDisplay').innerText = `${data.username} (${data.role})`;
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('navBar').classList.remove('hidden');
                document.getElementById('storeSection').classList.remove('hidden');
                
                if (data.role === 'Admin') {
                    document.getElementById('adminPanel').classList.remove('hidden');
                }
                loadProducts();
                loadOrders();
            } else {
                alert(data.message);
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('navBar').classList.add('hidden');
            document.getElementById('storeSection').classList.add('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
        }

        // --- Product Operations ---
        async function loadProducts() {
            const response = await fetch(`${API_URL}/products`);
            const products = await response.json();
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';

            products.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <h3>${p.name}</h3>
                        <p>${p.description}</p>
                        <div class="price">$${p.price}</div>
                        <button onclick="placeOrder('${p.name}', ${p.price})">Buy Now</button>
                    </div>
                `;
            });
        }

        async function addProduct() {
            const name = document.getElementById('prodName').value;
            const price = document.getElementById('prodPrice').value;
            const description = document.getElementById('prodDesc').value;

            await fetch(`${API_URL}/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price, description })
            });
            alert('Product added successfully!');
            loadProducts();
        }

        // --- Order Operations ---
        async function placeOrder(prodName, price) {
            await fetch(`${API_URL}/orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: currentUser.username,
                    items: [prodName],
                    total: price
                })
            });
            alert('Order submitted successfully!');
            loadOrders();
        }

        async function loadOrders() {
            const response = await fetch(`${API_URL}/orders`);
            const orders = await response.json();
            const orderList = document.getElementById('orderList');
            orderList.innerHTML = '';

            if(orders.length === 0) {
                orderList.innerHTML = 'No transactions found.';
                return;
            }

            orders.forEach(o => {
                orderList.innerHTML += `
                    <div style="border-bottom: 1px solid #eee; padding: 10px 0;">
                        <strong>Order ID:</strong> ${o._id} | 
                        <strong>Buyer:</strong> ${o.username} | 
                        <strong>Items:</strong> ${o.items.join(', ')} | 
                        <strong>Total:</strong> $${o.total} | 
                        <span style="color: orange; font-weight:bold;">[${o.status}]</span>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>//
